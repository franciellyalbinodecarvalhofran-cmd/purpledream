{% load static %}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purple Dream - Cardápio do Dia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background: #e9d5ff;
            min-height: 100vh;
        }

        /* Fundo com imagem de bolo igual mockup */
        .hero {
           
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Menu topo roxo */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            background: rgba(106, 27, 154, 0.9);
            padding: 25px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: white;
            font-family: 'Brush Script MT', cursive;
        }

        .menu {
            display: flex;
            gap: 35px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }

        .btn-whatsapp {
            border: 2px solid white;
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        /* Título Cardápio do Dia */
        .hero h1 {
            font-size: 56px;
            color: white;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .hero p {
            color: white;
            font-size: 16px;
            text-align: center;
            max-width: 600px;
            opacity: 0.9;
        }

        /* Caixa de Login com efeito vidro */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 45px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            margin-top: 40px;
        }

        .login-card h3 {
            text-align: center;
            color: #6a1b9a;
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .login-card label {
            display: block;
            color: #6a1b9a;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .login-card input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #ce93d8;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            outline: none;
        }

        .login-card input:focus {
            border-color: #6a1b9a;
        }

        .btn-entrar {
            width: 100%;
            background: #6a1b9a;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-entrar:hover {
            background: #4a148c;
        }

        /* Seção Mais Vendidos roxa */
        .mais-vendidos {
            background: #6a1b9a;
            padding: 60px 50px 80px;
            text-align: center;
        }

        .mais-vendidos h2 {
            color: white;
            font-size: 32px;
            margin-bottom: 50px;
            font-weight: 600;
        }

        .grid-doces {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .doce-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
        }

        .doce-item:hover {
            transform: translateY(-8px);
        }

        .doce-item img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .btn-encomendar {
            background: #6a1b9a;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .grid-doces { grid-template-columns: repeat(2, 1fr); }
            nav { flex-direction: column; gap: 15px; }
            .hero h1 { font-size: 38px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <nav>
            <div class="logo">Purple DREAM</div>
            <div class="menu">
                <a href="#">Localização</a>
                <a href="#">Contato</a>
                <a href="#" class="btn-whatsapp">Fazer Pedido</a>
            </div>
        </nav>

        <h1>Cardápio do Dia</h1>
        <p>Faça seu pedido online e retire na loja ou receba em casa</p>

        <div class="login-card">
            <h3>Login</h3>
            <label>Nome</label>
            <input type="text" placeholder="Seu nome">
            
            <label>Email</label>
            <input type="email" placeholder="seu@email.com">
            
            <label>Senha</label>
            <input type="password" placeholder="Sua senha">
            
            <button class="btn-entrar">Entrar</button>
        </div>
    </section>

    <section class="mais-vendidos">
        <h2>Mais Vendidos</h2>
        <div class="grid-doces">
            <div class="doce-item">
                <img src="{% static 'img/image4.png' %}" alt="Trufas">
                <button class="btn-encomendar">Encomendar</button>
            </div>
            <div class="doce-item">
                <img src="{% static 'img/8d3805ee-6403-45f0-9a54-a55a85172f991.png' %}" alt="Bolo">
                <button class="btn-encomendar">Encomendar</button>
            </div>
            <div class="doce-item">
                <img src="{% static 'img/8d3805ee-6403-45f0-9a54-a55a85172f991.png' %}"alt="Brownie">
                <button class="btn-encomendar">Encomendar</button>
            </div>
            <div class="doce-item">
                <img src="{% static 'img/8d3805ee-6403-45f0-9a54-a55a85172f991.png' %}" alt="Torta">
                <button class="btn-encomendar">Encomendar</button>
            </div>
        </div>
    </section>

</body>
</html>
