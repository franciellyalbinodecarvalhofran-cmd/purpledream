<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doceria - Cardápio Digital</title>
    <style>
        /* CSS - ESTILIZAÇÃO BASEADA NO FIGMA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9f6fc;
            color: #4a2840;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Simulação da tela do celular */
        .smartphone-screen {
            width: 100%;
            background-color: #ffffff;
            border: 8px solid #333;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.2);
            overflow-y: hidden;
            max-width: 1200px;
        }

        /* Header / Topo */
        
        header {
            background-color: #6a1b9a;
            color: white;
            padding: 40px;
            text-align: center;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
        }

        .logo-placeholder {
            width: 60px;
            height: 60px;
            background-color: #e1bee7;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #6a1b9a;
            font-weight: bold;
            font-size: 12px;
        }

        /* Seção de Login / Cadastro Rápido */
        .login-box {
            padding: 20px;
            background-color: #f3e5f5;
            margin: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ce93d8;
            border-radius: 8px;
            outline: none;
        }

        .btn-entrar {
            width: 100%;
            background-color: #6a1b9a;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Títulos */
        h2 {
            text-align: center;
            font-size: 18px;
            color: #4a148c;
            margin: 15px 0 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid do Cardápio (Doces) */
        .cardapio-grid {
            display: grid;
            grid-template-columns: repeat(41fr);
            gap: 20px;
            padding: 30px;
        }

        .doce-card {
            background-color: #ffffff;
            border: 2px solid #e1bee7;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .doce-img {
            width: 100%;
            height: 90px;
            background-color: #d7ccc8;
            border-radius: 8px;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .doce-nome {
            font-size: 13px;
            font-weight: bold;
            color: #4e342e;
            margin-bottom: 4px;
        }

        .btn-encomenda {
            background-color: #8e24aa;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            margin-top: 5px;
        }

        /* Seção Onde Estamos / Rodapé */
        .footer-info {
            padding: 15px;
            background-color: #f3e5f5;
            text-align: center;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            color: #25D366;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .mapa-placeholder {
            width: 100%;
            height: 80px;
            background-color: #b2dfdb;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            color: #004d40;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <!-- Container simulando o dispositivo móvel -->
    <div class="smartphone-screen">
        
        <!-- Topo do App -->
        <header>
            <div class="logo-placeholder">DOCE</div>
            <h1>Cardápio do Dia</h1>
        </header>

        <!-- Área de Acesso/Identificação -->
        <section class="login-box">
            <input type="text" placeholder="NOME">
            <input type="tel" placeholder="TELEFONE">
            <button class="btn-entrar">ENTRAR</button>
        </section>

        <h2>Mais Vendidos</h2>

        <!-- Grid de Produtos conforme o Figma -->
        <section class="cardapio-grid">
            <div class="doce-card">
                <!-- Substitua 'brigadeiro.jpg' pela sua imagem real -->
                <img src="https://placeholder.com" alt="Brigadeiro" class="doce-img">
                <div class="doce-nome">Brigadeiro Gourmet</div>
                <button class="btn-encomenda">Encomendar</button>
            </div>

            <div class="doce-card">
                <img src="https://placeholder.com" alt="Bolo de Pote" class="doce-img">
                <div class="doce-nome">Bolo de Pote</div>
                <button class="btn-encomenda">Encomendar</button>
            </div>

            <div class="doce-card">
                <img src="https://placeholder.com" alt="Cupcake" class="doce-img">
                <div class="doce-nome">Cupcakes Variados</div>
                <button class="btn-encomenda">Encomendar</button>
            </div>

            <div class="doce-card">
                <img src="https://placeholder.com" alt="Trufas" class="doce-img">
                <div class="doce-nome">Trufas Recheadas</div>
                <button class="btn-encomenda">Encomendar</button>
            </div>
        </section>

        <!-- Informações de Contato e Localização -->
        <footer class="footer-info">
            <a href="#" class="whatsapp-link">🟢 Chamar no WhatsApp</a>
            <div><strong>Onde Estamos</strong></div>
            <div class="mapa-placeholder">📍 Mapa / Localização da Loja</div>
        </footer>

    </div>

</body>
</html>
