<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
</head>
<body> 
    <style>
    /* Seção Mais Vendidos roxa */
    .mais-vendidos {
        background: #6a1b9a;
        padding: 60px 50px 80px;
        text-align: center;
    }

    .mais-vendidos h2 {
        color: white;
        font-size: 32px;
        margin-bottom: 50px;
        font-weight: 600;
    }

    .grid-doces {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 25px;
        max-width: 1100px;
        margin: 0 auto;
    }

    .doce-item {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        transition: 0.3s;
    }

    .doce-item:hover {
        transform: translateY(-8px);
    }

    .doce-item img {
        width: 100%;
        height: 160px;
        object-fit: cover;
    }

    .btn-encomendar {
        background: #6a1b9a;
        color: white;
        border: none;
        width: 100%;
        padding: 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
    }

    @media (max-width: 768px) {
        .grid-doces { grid-template-columns: repeat(2, 1fr); }
        nav { flex-direction: column; gap: 15px; }
        .hero h1 { font-size: 38px; }
    }
</style>
</head>
<body>

</body>
</html>
